<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIT Shuttle Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>🚌 MIT Shuttle Tracker</h1>
        <div class="status">
          <span id="connection-status" class="status-dot"></span>
          <span id="last-update">Connecting...</span>
        </div>
      </header>
      
      <main class="main">
        <aside class="sidebar">
          <div class="section">
            <h2>Active Shuttles</h2>
            <div id="shuttle-list" class="shuttle-list">
              <p class="loading">Loading shuttles...</p>
            </div>
          </div>
          
          <div class="section">
            <h2>Routes</h2>
            <div id="route-filters" class="route-filters">
              <p class="loading">Loading routes...</p>
            </div>
          </div>
        </aside>
        
        <div id="map" class="map"></div>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
