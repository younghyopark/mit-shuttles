<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#a31f34" />
    <title>MIT Shuttle Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>🚌 MIT Shuttles</h1>
        <div class="header-right">
          <div class="status">
            <div id="last-update" class="last-update">
              <span id="last-update-line1">Connecting...</span>
              <span id="last-update-line2"></span>
            </div>
            <span id="connection-status" class="status-dot"></span>
          </div>
          <button id="refresh-btn" class="refresh-btn" aria-label="Refresh">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2v6h-6"/>
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              <path d="M3 22v-6h6"/>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
          </button>
        </div>
      </header>
      
      <div id="pinned-panel" class="pinned-panel hidden" aria-label="Pinned stop arrivals"></div>

      <div id="pin-picker" class="pin-picker hidden" role="dialog" aria-modal="true" aria-label="Change pinned stop">
        <div class="pin-picker-card">
          <header class="pin-picker-header">
            <button class="pin-picker-back hidden" aria-label="Back to routes">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
            </button>
            <h2 class="pin-picker-title">Pin a stop</h2>
            <button class="pin-picker-close" aria-label="Close">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
          <div class="pin-picker-body"></div>
        </div>
      </div>

      <main class="main">
        <div id="map" class="map"></div>
        
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-handle" id="sidebar-handle">
            <div class="handle-bar"></div>
            <span class="handle-label" id="shuttle-count">Active Shuttles</span>
          </div>
          
          <div class="sidebar-content" id="sidebar-content">
            <div class="section shuttle-section">
              <div id="shuttle-list" class="shuttle-list">
                <p class="loading">Loading shuttles...</p>
              </div>
            </div>
            
            <div class="section routes-section">
              <h2>Routes</h2>
              <div id="route-filters" class="route-filters">
                <p class="loading">Loading routes...</p>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
