<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#a31f34" />
    <title>MIT Shuttle Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>🚌 MIT Shuttles</h1>
        <div class="header-right">
          <div class="status">
            <div id="last-update" class="last-update">
              <span id="last-update-line1">Connecting...</span>
              <span id="last-update-line2"></span>
            </div>
            <span id="connection-status" class="status-dot"></span>
          </div>
          <button id="refresh-btn" class="refresh-btn" aria-label="Refresh">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2v6h-6"/>
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              <path d="M3 22v-6h6"/>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
          </button>
        </div>
      </header>
      
      <div id="pinned-panel" class="pinned-panel hidden" aria-label="Pinned stop arrivals"></div>

      <div id="pin-picker" class="pin-picker hidden" role="dialog" aria-modal="true" aria-label="Change pinned stop">
        <div class="pin-picker-card">
          <header class="pin-picker-header">
            <button class="pin-picker-back hidden" aria-label="Back to routes">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
            </button>
            <h2 class="pin-picker-title">Pin a stop</h2>
            <button class="pin-picker-close" aria-label="Close">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
          <div class="pin-picker-body"></div>
        </div>
      </div>

      <main class="main">
        <div id="map" class="map"></div>

        <!-- Dark/light map tile toggle — stacked above the route FAB. -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle map theme" title="Toggle dark/light map"></button>

        <!-- Floating route-selection button — replaces the old bottom-sheet
             sidebar. Sits in the bottom-right corner of the map, above the
             Leaflet attribution. Tap to open the compact route picker. -->
        <button id="route-fab" class="route-fab" aria-label="Toggle routes" title="Choose routes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
        </button>

        <!-- Full-screen route picker with blurred backdrop. -->
        <div id="route-picker" class="route-picker hidden" role="dialog" aria-modal="true" aria-label="Route selection">
          <div class="route-picker-card">
            <div class="route-picker-header">
              <span>Routes</span>
              <button class="route-picker-close" aria-label="Close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div id="route-picker-list" class="route-picker-list"></div>
          </div>
        </div>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
