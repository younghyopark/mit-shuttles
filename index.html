<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#a31f34" />
    <title>MIT Shuttle Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>🚌 MIT Shuttles</h1>
        <div class="header-right">
          <button id="refresh-btn" class="refresh-btn" aria-label="Refresh">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2v6h-6"/>
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              <path d="M3 22v-6h6"/>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
          </button>
          <div class="status">
            <span id="connection-status" class="status-dot"></span>
            <span id="last-update">Connecting...</span>
          </div>
        </div>
      </header>
      
      <main class="main">
        <div id="map" class="map"></div>
        
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-handle" id="sidebar-handle">
            <div class="handle-bar"></div>
            <span class="handle-label" id="shuttle-count">Active Shuttles</span>
          </div>
          
          <div class="sidebar-content" id="sidebar-content">
            <div class="section shuttle-section">
              <div id="shuttle-list" class="shuttle-list">
                <p class="loading">Loading shuttles...</p>
              </div>
            </div>
            
            <div class="section routes-section">
              <h2>Routes</h2>
              <div id="route-filters" class="route-filters">
                <p class="loading">Loading routes...</p>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
